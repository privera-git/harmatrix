<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#181818"/>
  <!-- 3×3 dot matrix — H shape with bottom-left→upper-right diagonal in light gray -->
  <!-- G=#00BD7E  D=#2d2d2d  L=#C0C0C0                                              -->
  <!-- Row 1 (top):    G  D  L -->
  <circle cx="8"  cy="8"  r="3.5" fill="#00BD7E"/>
  <circle cx="16" cy="8"  r="3.5" fill="#2d2d2d"/>
  <circle cx="24" cy="8"  r="3.5" fill="#C0C0C0"/>
  <!-- Row 2 (middle): G  L  G -->
  <circle cx="8"  cy="16" r="3.5" fill="#00BD7E"/>
  <circle cx="16" cy="16" r="3.5" fill="#C0C0C0"/>
  <circle cx="24" cy="16" r="3.5" fill="#00BD7E"/>
  <!-- Row 3 (bottom): L  D  G -->
  <circle cx="8"  cy="24" r="3.5" fill="#C0C0C0"/>
  <circle cx="16" cy="24" r="3.5" fill="#2d2d2d"/>
  <circle cx="24" cy="24" r="3.5" fill="#00BD7E"/>
</svg>
